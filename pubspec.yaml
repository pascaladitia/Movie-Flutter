name: movie_flutter
description: "Movie app with clean architecture and BLoC"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  flutter_dotenv: ^5.2.1
  flutter_bloc: ^9.1.0
  equatable: ^2.0.5
  dio: ^5.8.0+1
  get_it: ^8.0.3
  cached_network_image: ^3.4.1
  sqflite: ^2.3.3+2
  path: ^1.9.1
  youtube_player_iframe: ^5.2.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
